<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <defs>
        <linearGradient id="cuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#3A86FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#06FFA5;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="cuGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#3A86FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#06FFA5;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background circle -->
    <circle class="bg" cx="64" cy="64" r="60" fill="#1a1a1a"/>

    <!-- C letter -->
    <path class="letter-c" d="M 48 38 Q 32 38 32 54 L 32 74 Q 32 90 48 90 L 52 90 Q 58 90 58 84 L 58 82 Q 58 78 54 78 L 48 78 Q 44 78 44 74 L 44 54 Q 44 50 48 50 L 52 50 Q 58 50 58 46 L 58 42 Q 58 38 52 38 Z" />

    <!-- Ü letter -->
    <path class="letter-u" d="M 68 42 L 68 72 Q 68 78 74 78 L 78 78 Q 84 78 84 72 L 84 42 Q 84 38 88 38 L 90 38 Q 94 38 94 42 L 94 72 Q 94 90 78 90 L 74 90 Q 58 90 58 72 L 58 42 Q 58 38 62 38 L 64 38 Q 68 38 68 42 Z" />

    <!-- Umlaut dots -->
    <circle class="dot" cx="72" cy="28" r="3.5"/>
    <circle class="dot" cx="86" cy="28" r="3.5"/>

    <style>
        .bg { fill: #1a1a1a; }
        .letter-c, .letter-u, .dot { fill: url(#cuGradient); }

        @media (prefers-color-scheme: dark) {
            .bg { fill: #0a0a0a; }
            .letter-c, .letter-u, .dot { fill: url(#cuGradientDark); }
        }
    </style>
</svg>
